<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | XMS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-wrapper">
      <a href="index.html" class="auth-logo">
        <span class="logo-x">X</span>MS
      </a>

      <div class="auth-card">
        <div class="auth-header">
          <span class="auth-tag">Área do assinante</span>
          <h1>Entrar na sua conta</h1>
          <p>Acesse sua área exclusiva para visualizar seus dados e conteúdos premium.</p>
        </div>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu e-mail"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Digite sua senha"
                required
              />
              <button
                type="button"
                class="password-toggle"
                data-toggle-password="password"
              >
                Mostrar
              </button>
            </div>
          </div>

          <p class="form-message" id="loginMessage"></p>

          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <div class="auth-footer">
          <p>Ainda não possui conta?</p>
          <a href="register.html">Criar cadastro</a>
        </div>

        <div class="back-link">
          <a href="index.html">← Voltar para a página inicial</a>
        </div>
      </div>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
